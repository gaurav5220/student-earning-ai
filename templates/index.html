<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Earning AI</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            background: white;
            width: 60%;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 40%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        .card {
            background: #f9f9f9;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #28a745;
        }

        .copy-btn:hover {
            background: #1e7e34;
        }
    </style>
</head>

<body>

<h1>💰 Student Earning AI</h1>

<div class="container">
    <form method="POST">
        <input type="text" name="budget" placeholder="Enter Budget (₹)" required>
        <input type="text" name="time" placeholder="Time per day" required>
        <br>
        <button type="submit">Generate</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>🚀 Ideas:</h3>

        {% for idea in result.split("Idea")[1:] %}
        <div class="card">
            <button class="copy-btn" onclick="copyText(this)">Copy</button>
            <pre>{{ idea }}</pre>
        </div>
        {% endfor %}

        <form method="POST">
            <input type="hidden" name="budget" value="{{ request.form.budget }}">
            <input type="hidden" name="time" value="{{ request.form.time }}">
            <button type="submit">🔄 Regenerate</button>
        </form>

    </div>
    {% endif %}
</div>

<script>
function copyText(button) {
    let text = button.parentElement.innerText;
    navigator.clipboard.writeText(text);
    button.innerText = "Copied!";
    setTimeout(() => button.innerText = "Copy", 2000);
}
</script>

</body>
</html>
