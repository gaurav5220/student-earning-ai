<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Earning AI</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0a0a0f, #1a0a2e);
    color: white;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container {
    width: 600px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    width: 100%;
    background: purple;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.result {
    white-space: pre-wrap;
    line-height: 1.6;
}
</style>

</head>
<body>

<div class="container">

<h1>💰 Student Earning AI</h1>

<div class="card">
    <form method="POST">
        <input type="number" name="budget" placeholder="Enter Budget ₹" required>
        <input type="number" name="time" placeholder="Hours per day" required>
        <button type="submit">Generate Ideas</button>
    </form>
</div>

{% if result %}
<div class="card">
    <h2>🎯 Your Ideas</h2>
    <div class="result">
        {{ result }}
    </div>

    <button onclick="copyText()">📋 Copy</button>
</div>
{% endif %}

</div>

<script>
function copyText() {
    const text = document.querySelector(".result").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
