<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Earning AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 48%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin: 10px 1%;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: #00c6ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .result-box {
            margin-top: 20px;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
        }

        .copy-btn {
            float: right;
            background: #28a745;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>💰 Student Earning AI</h1>

    <form method="POST">
        <input type="number" name="budget" placeholder="Enter Budget ₹" required>
        <input type="number" name="time" placeholder="Hours per day" required>

        <button type="submit">Generate Ideas</button>
    </form>

    {% if result %}
    <div class="result-box">
        <button class="copy-btn" onclick="copyText()">Copy</button>
        <div id="resultText">{{ result }}</div>
    </div>
    {% endif %}

</div>

<script>
function copyText() {
    const text = document.getElementById("resultText").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
